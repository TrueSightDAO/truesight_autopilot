# nginx server block for Sophia (sophia.truesight.me)
# Proxy to the FastAPI app on port 8001.
#
# Install (BOTH files — the zone declaration must go in http context):
#   sudo ln -sf /opt/truesight_autopilot/config/nginx/sophia-zones.conf \
#               /etc/nginx/conf.d/sophia-zones.conf
#   sudo ln -sf /opt/truesight_autopilot/config/nginx/sophia.conf \
#               /etc/nginx/sites-available/sophia
#   sudo ln -sf /etc/nginx/sites-available/sophia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (certbot):
#   sudo certbot --nginx -d sophia.truesight.me

server {
    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/sophia.truesight.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/sophia.truesight.me/privkey.pem; # managed by Certbot
    server_name sophia.truesight.me;

    # Rate limiting — `limit_req_zone` lives in sophia-zones.conf (http context).
    # `limit_req` references the zone and stays here (server context).
    limit_req zone=sophia_global burst=50 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — 2 years, includeSubDomains, preload-eligible. Tells the browser
    # "always come back over HTTPS, skip the http:// hop entirely" — which is
    # what makes the "Not secure" warning disappear on subsequent visits.
    # First visit still does http→301→https; without HSTS the browser also
    # does http→301→https on every following visit, briefly showing insecure.
    # https://hstspreload.org if we ever want browsers to skip even the first
    # http:// attempt (requires submitting the domain to the preload list).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS is owned by FastAPI's CORSMiddleware (see app/main.py — configured
    # with allow_origins=["*"] + allow_credentials=True, which Starlette
    # correctly translates into per-origin echo + Vary: Origin). We previously
    # had `add_header Access-Control-Allow-Origin "*"` here as a "safety net"
    # for non-app responses, but that produced TWO Allow-Origin headers in
    # successful responses (one per-origin from FastAPI, one "*" from nginx) —
    # browsers reject duplicate ACAO with a CORS error.
    #
    # Trade-off accepted: pure nginx error responses (e.g. 502, 504, 413) won't
    # carry CORS headers. Those are rare and operator-visible enough that
    # spending a duplicate-header bug to handle them isn't worth it. If we
    # ever need CORS on nginx-side errors, the right pattern is `more_set_headers`
    # from the nginx-extras module (overrides instead of appends) — not
    # add_header.
    #
    # OPTIONS preflight is also handled by FastAPI's CORSMiddleware (it returns
    # 200 with the correct per-origin ACAO and ACAH echoed from the request).
    # The previous `if ($request_method = OPTIONS) { return 204; }` short-circuit
    # is removed for the same single-source-of-truth reason.

    # Logging
    access_log /var/log/nginx/sophia_access.log;
    error_log /var/log/nginx/sophia_error.log;

    # Main proxy
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }


    # Vault web page (dedicated worker on port 8002 — stays responsive when main bot is busy)
    location /vault/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # No buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Oracle Advisory endpoint
    location /oracle-advisory {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for LLM-backed endpoint
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # No buffering
        proxy_buffering off;
    }

    # Chat endpoint (SSE)
    location /chat {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires no buffering
        proxy_buffering off;
        proxy_cache off;

        # Keepalive for SSE
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Long timeout for streaming responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Disable request body buffering for streaming
        client_body_buffer_size 1m;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static files
    location /static/ {
        alias /opt/truesight_autopilot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Monit proxy (HTTPS access to monit web UI)
    location /monit/ {
        rewrite ^/monit/(.*) /$1 break;
        proxy_pass http://127.0.0.1:2812;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
    }

}


server {
    if ($host = sophia.truesight.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name sophia.truesight.me;
    return 404; # managed by Certbot


}