# nginx server block for Sophia (sophia.truesight.me)
# Proxy to the FastAPI app on port 8001.
#
# Install (BOTH files — the zone declaration must go in http context):
#   sudo ln -sf /opt/truesight_autopilot/config/nginx/sophia-zones.conf \
#               /etc/nginx/conf.d/sophia-zones.conf
#   sudo ln -sf /opt/truesight_autopilot/config/nginx/sophia.conf \
#               /etc/nginx/sites-available/sophia
#   sudo ln -sf /etc/nginx/sites-available/sophia /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (certbot):
#   sudo certbot --nginx -d sophia.truesight.me

server {
    listen 80;
    server_name sophia.truesight.me;

    # Rate limiting — `limit_req_zone` lives in sophia-zones.conf (http context).
    # `limit_req` references the zone and stays here (server context).
    limit_req zone=sophia_global burst=50 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS — 2 years, includeSubDomains, preload-eligible. Tells the browser
    # "always come back over HTTPS, skip the http:// hop entirely" — which is
    # what makes the "Not secure" warning disappear on subsequent visits.
    # First visit still does http→301→https; without HSTS the browser also
    # does http→301→https on every following visit, briefly showing insecure.
    # https://hstspreload.org if we ever want browsers to skip even the first
    # http:// attempt (requires submitting the domain to the preload list).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # CORS headers — set at server level (with `always`) so they're returned on
    # every response including the OPTIONS 204 below. `add_header` is NOT
    # allowed inside `if {}` blocks (nginx's if-is-evil rule), so the headers
    # have to live out here at server context.
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Public-Key,X-Session-Id,X-Payload,X-Signature" always;
    add_header Access-Control-Max-Age 1728000 always;

    # Short-circuit CORS preflight. Inside an `if` only return/rewrite/set/break
    # are allowed — no add_header — so we just return 204 and the server-level
    # add_header directives above attach the CORS headers.
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Logging
    access_log /var/log/nginx/sophia_access.log;
    error_log /var/log/nginx/sophia_error.log;

    # Main proxy
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Oracle Advisory endpoint
    location /oracle-advisory {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for LLM-backed endpoint
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # No buffering
        proxy_buffering off;
    }

    # Chat endpoint (SSE)
    location /chat {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires no buffering
        proxy_buffering off;
        proxy_cache off;

        # Keepalive for SSE
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Long timeout for streaming responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Disable request body buffering for streaming
        client_body_buffer_size 1m;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static files
    location /static/ {
        alias /opt/truesight_autopilot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
