# nginx server block for Sophia (sophia.truesight.me)
# Proxy to the FastAPI app on port 8001.
#
# Install:
#   ln -sf /opt/truesight_autopilot/config/nginx/sophia.conf /etc/nginx/sites-available/sophia
#   ln -sf /etc/nginx/sites-available/sophia /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# SSL (certbot):
#   certbot --nginx -d sophia.truesight.me

server {
    listen 80;
    server_name sophia.truesight.me;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=sophia_global:10m rate=30r/s;
    limit_req zone=sophia_global burst=50 nodelay;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS headers (pre-flight)
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Public-Key,X-Session-Id,X-Payload,X-Signature" always;
        add_header Access-Control-Max-Age 1728000 always;
        return 204;
    }

    # Logging
    access_log /var/log/nginx/sophia_access.log;
    error_log /var/log/nginx/sophia_error.log;

    # Main proxy
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 120s;

        # Buffering
        proxy_buffering off;
        proxy_cache off;
    }

    # Oracle Advisory endpoint
    location /oracle-advisory {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeouts for LLM-backed endpoint
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # No buffering
        proxy_buffering off;
    }

    # Chat endpoint (SSE)
    location /chat {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requires no buffering
        proxy_buffering off;
        proxy_cache off;

        # Keepalive for SSE
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # Long timeout for streaming responses
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        # Disable request body buffering for streaming
        client_body_buffer_size 1m;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
    }

    # Uploaded files
    location /uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Static files
    location /static/ {
        alias /opt/truesight_autopilot/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
