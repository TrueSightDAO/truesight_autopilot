# nginx location block for /oracle-advisory
# Proxy to the FastAPI app on port 8001.
# Include this in your server block, e.g.:
#   include /opt/truesight_autopilot/config/nginx/oracle-advisory.conf;

location /oracle-advisory {
    proxy_pass http://127.0.0.1:8001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase timeouts for LLM-backed endpoint
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    # No buffering — the endpoint returns a simple JSON response
    proxy_buffering off;
}
