# nginx http-context zones for Sophia (sophia.truesight.me)
#
# This file MUST be installed in a location nginx includes in `http {}` context,
# typically /etc/nginx/conf.d/, NOT /etc/nginx/sites-enabled/ (which is inside
# server context). `limit_req_zone` is an http-only directive — placing it in a
# server block causes nginx -t to fail with:
#   "limit_req_zone" directive is not allowed here
#
# Install:
#   sudo ln -sf /opt/truesight_autopilot/config/nginx/sophia-zones.conf \
#               /etc/nginx/conf.d/sophia-zones.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# The companion server block (sophia.conf) references the `sophia_global` zone
# via `limit_req` and so must be installed AFTER this file.

limit_req_zone $binary_remote_addr zone=sophia_global:10m rate=30r/s;
