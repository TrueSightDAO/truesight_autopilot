# nginx config for sophia.truesight.me
# After setting up, run certbot to add SSL:
#   certbot --nginx -d sophia.truesight.me
# certbot will add the SSL config automatically.

server {
    listen 80;
    server_name sophia.truesight.me;

    # Proxy all requests to the autopilot FastAPI server
    location / {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static files if they exist
    location /static/ {
        alias /opt/truesight_autopilot/static/;
    }
}
