name: Run tests

on:
  push:
    branches: [main, "feature/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || pip install pytest pytest-asyncio ruff cryptography google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Check syntax
        run: python -m compileall -q app scripts tests

      - name: Check formatting
        run: python -m ruff format --check app tests 2>/dev/null || echo "Ruff format check skipped (not critical)"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short 2>&1
        env:
          PYTHONPATH: .
          TELEGRAM_ALLOWED_USER_IDS: "12345"
          GOVERNOR_NAMES: "Gary Teh"
