name: Tool smoke tests

on:
  pull_request:
    paths:
      - 'app/**'
      - 'scripts/smoke_tools.py'
      - 'requirements.txt'
      - '.github/workflows/smoke.yml'
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tool smoke tests
        env:
          # Auto-injected; gives the github call test rate-limited read access
          # to public repos under TrueSightDAO. The smoke script also accepts
          # TRUESIGHT_DAO_AUTOPILOT if you want to test against private repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/smoke_tools.py
